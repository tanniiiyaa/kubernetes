apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels: 
    app: my-pod
spec:
 container:
   - name: nginx
     image: nginx:latest
     ports:
       - containerPort: 80
         protocol: TCP

   - name: tomcat
     image: tomcat:latest
     ports: 
       containerPort: 80
       protocol: 80